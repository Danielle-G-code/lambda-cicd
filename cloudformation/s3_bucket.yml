AWSTemplateFormatVersion: '2010-09-09'
Description: "CloudFormation template to create an S3 bucket for CICD pull request"
Parameters:
    Environment:
        Type: String
        Default: test
        AllowedValues: 
          - test
          - staging
          - production 

Resources:
  MyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Environment
          Value: GitHubActionsTesting

Outputs:
  BucketName:
    Description: 'Name of the S3 bucket'
    Value: !Ref MyS3Bucket
