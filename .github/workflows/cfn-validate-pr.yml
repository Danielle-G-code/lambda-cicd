name: Validate CloudFormation Template on PR

on:
  pull_request:
    paths:
      - cloudformation/**

permissions:
    pull-requests: write
    contents: read

jobs:
    # First job to validate the cloudformation template and deploy a test stack for the pr
    validate-cfn:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code # Access the cloudformation template
              uses: actions/checkout@v4
        
            - name: Configure AWS credentials # Set up AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: eu-west-2

            - name: Validate CloudFormation Template # Check if the cloudformation template is valid
              run: |
                aws cloudformation validate-template --template-body file://cloudformation/s3_bucket.yml

            - name: Deploy CloudFormation Stack (Test) # Deploy a test stack for the pr
              run: |
                stack_name="pr-test-stack-${{ github.event.pull_request.number }}"
                if aws cloudformation describe-stacks --stack-name $stack_name 2>/dev/null; then
                  aws cloudformation update-stack --stack-name $stack_name --template-body file://cloudformation/s3_bucket.yml --parameters ParameterKey=Environment,ParameterValue=test || echo "No updates needed"
                else
                  aws cloudformation create-stack --stack-name $stack_name --template-body file://cloudformation/s3_bucket.yml --parameters ParameterKey=Environment,ParameterValue=test
                fi

            - name: Comment on the pr # Let the pr author know that the test stack has been deployed
              uses: actions/github-script@v6
              with:
                github-token: ${{ secrets.GITHUB_TOKEN }}
                script: |
                    github.rest.issues.createComment({
                        issue_number: context.issue.number, 
                        owner: context.repo.owner, 
                        repo: context.repo.repo,
                        body: 'Cloudformation test stack deployed. Stack name: pr-test-stack-${{ github.event.pull_request.number }}'
                        })

    # Second job to clean up the test stack when the pr is merged
    cleanup-on-merge: 
        runs-on: ubuntu-latest
        if: github.event.pull_request.merged == true
        steps:
            - name: Configure AWS credentials # Set up AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: eu-west-2

            - name: Delete CloudFormation Stack (Test) # Clean up the test stack when the pr is merged
              run: |
                stack_name="pr-test-stack-${{ github.event.pull_request.number }}"
                aws cloudformation delete-stack --stack-name $stack_name